<html>

<head>

	<!-- Load ioBroker scripts and styles-->
	<link rel="stylesheet" type="text/css" href="../../lib/css/materialize.css">
	<link rel="stylesheet" type="text/css" href="../../css/adapter.css" />
	<script type="text/javascript" src="../../lib/js/jquery-3.2.1.min.js"></script>
	<script type="text/javascript" src="../../socket.io/socket.io.js"></script>

	<!-- these files always have to be included -->
    <script type="text/javascript" src="../../js/translate.js"></script>
    <script type="text/javascript" src="../../lib/js/materialize.js"></script>
    <script type="text/javascript" src="../../js/adapter-settings.js"></script>
    <script type="text/javascript" src="words.js"></script>

	<!-- Load our own files -->
	<link rel="stylesheet" type="text/css" href="style.css" />

	<script type="text/javascript">
        // This will be called by the admin adapter when the settings page loads
        var _secret;

		// the function loadSettings has to exist ...
		function load(settings, onChange) {
			if (typeof supportsFeature !== 'function' || !supportsFeature('ADAPTER_AUTO_DECRYPT_NATIVE')) {
				if (typeof systemSecret !== 'undefined') {
					_secret = systemSecret;
				} else {
					_secret = (systemConfig && systemConfig.native && systemConfig.native.secret) || 'Zgfr56gFe87jJOM';
				}
				if (settings.token) {
					settings.token = decrypt(_secret, settings.token);
				}
			}

			for (var key in settings) {
				if (!settings.hasOwnProperty(key)) continue;
				var $value = $('#' + key + '.value');
				if ($value.attr('type') === 'checkbox') {
					$value.prop('checked', settings[key]).on('change', function() {
						onChange();
					});
				} else {
					$value.val(settings[key]).on('change', function() {
						onChange();
					}).on('keyup', function() {
						onChange();
					});
				}
			}
			onChange(false);
			$('#test').click(test);
		}

        function getSettings() {
			var obj = {};

			$('.value').each(function () {
				var $this = $(this);
				var id = $this.attr('id');

				if ($this.attr('type') === 'checkbox') {
					obj[id] = $this.prop('checked');
				} else {
					obj[id] = $this.val();
				}
			});

			if (typeof supportsFeature !== 'function' || !supportsFeature('ADAPTER_AUTO_DECRYPT_NATIVE')) {
				if (obj.token) {
					obj.token = encrypt(_secret, obj.token);
				}
			}

			return obj;
		}

		function save(callback) {
			callback(getSettings());
		}
    </script>

</head>

<body>
	<div id="adapter-container">
		<div class="m adapter-container">
			<div class="row">
				<div class="col s12 m4 l2">
					<img src="alphainnotec.png" class="logo">
				</div>
				<div class="row">

					<div class="col s6 input-field">
						<input type="text" class="value" id="ipaddress" />

					</div>

					<div class="col s6 input-field">

					</div>

					<div class="col s6 input-field">
						<input type="password" class="value" id="password" />
						<label for="password" class="translate">password</label>
					</div>

					<div class="col s6 input-field">
						<input type="number" class="value" id="polltime" min="5" />
						<label for="polltime" class="translate">polltime</label>
					</div>

				</div>
				<div class="row">
					<!--<div class="col s12 input-field">

</body>
